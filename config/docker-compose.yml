services:
  nutritrace:
    image: ghcr.io/traceapps/nutritrace:latest
    container_name: nutritrace
    ports:
      - "3000:3001"
    volumes:
      - ${DATA_DB_PATH}:/data/db
      - ${DATA_UPLOADS_PATH}:/data/uploads
    env_file:
      - .env
    environment:
      - TZ=Asia/Singapore
      - DB_PATH=/data/db/nutritrace.db
      - UPLOADS_PATH=/data/uploads
      - JWT_SECRET=${JWT_SECRET}
      - RECOVERY_TOKEN=${RECOVERY_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    restart: unless-stopped

  nutritrace-api:
    image: python:3.11-alpine
    container_name: nutritrace-api
    ports:
      - "3002:3002"
    volumes:
      - ${DATA_DB_PATH}:/data/db
      - ./nutritrace-api.py:/opt/nutritrace-api.py:ro
    environment:
      - TZ=Asia/Singapore
      - NT_DB_PATH=/data/db/nutritrace.db
    command: python3 /opt/nutritrace-api.py
    restart: unless-stopped

  nutritrace-mcp:
    image: python:3.11-alpine
    container_name: nutritrace-mcp
    ports:
      - "3003:3003"
    volumes:
      - ./nutritrace-mcp.py:/opt/nutritrace-mcp.py:ro
    environment:
      - TZ=Asia/Singapore
      - NT_API_URL=http://nutritrace-api:3002
      - NT_MCP_PORT=3003
    command: python3 /opt/nutritrace-mcp.py
    restart: unless-stopped
